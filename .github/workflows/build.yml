name: Build And Attach Executables

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os_name }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os_name: linux
            arch: x64
            target: x86_64-unknown-linux-gnu
            ext: ""
          - runner: ubuntu-24.04-arm
            os_name: linux
            arch: arm64
            target: aarch64-unknown-linux-gnu
            ext: ""
          - runner: windows-latest
            os_name: windows
            arch: x64
            target: x86_64-pc-windows-msvc
            ext: ".exe"
          - runner: windows-11-arm
            os_name: windows
            arch: arm64
            target: aarch64-pc-windows-msvc
            ext: ".exe"
          - runner: macos-latest
            os_name: macos
            arch: arm64
            target: aarch64-apple-darwin
            ext: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Rust target (fallback)
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        env:
          WHITESPINE_RELEASE: "1"
        run: cargo build --release --target=${{ matrix.target }}

      - name: Prepare asset name
        id: prepare-asset
        shell: bash
        run: |
          asset_name="whitespine-${{ github.event.release.tag_name }}-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.ext }}"
          echo "asset_name=${asset_name}" >> "$GITHUB_OUTPUT"

      - name: Copy and rename binary
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/whitespine${{ matrix.ext }}" "${{ steps.prepare-asset.outputs.asset_name }}"

      - name: Upload binary to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release upload "${{ github.event.release.tag_name }}"
          "${{ steps.prepare-asset.outputs.asset_name }}" --clobber
